<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hodim paneli — PenoDecorPro</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body{background:#f8f8f6;margin:0;min-height:100vh}
    .h-topbar{background:#fff;border-bottom:1px solid #eee;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
    .h-topbar .name{font-size:15px;font-weight:700;color:#111}
    .h-topbar .role{font-size:12px;color:#999}
    .h-logout{font-size:13px;color:#DC2626;text-decoration:none;padding:8px 12px;border-radius:7px;border:1px solid #FADBD8}
    .h-body{max-width:480px;margin:0 auto;padding:18px}
    .h-card{background:#fff;border-radius:16px;border:1px solid #ebebeb;padding:22px;margin-bottom:16px}
    .h-card-title{font-size:16px;font-weight:700;color:#111;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .field-label{font-size:11px;color:#999;font-weight:500;text-transform:uppercase;letter-spacing:.3px;margin-bottom:5px;display:block}
    .field-input{width:100%;padding:13px 14px;border:1.5px solid #e8e8e8;border-radius:9px;font-size:16px;color:#111;outline:none;background:#fafafa;margin-bottom:14px;box-sizing:border-box}
    .field-input:focus{border-color:#2563EB;background:#fff}
    .h-btn{width:100%;padding:14px;background:#2563EB;color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer}
    .h-btn:disabled{background:#ccc;cursor:not-allowed}
    .h-msg{padding:11px 14px;border-radius:8px;font-size:13.5px;margin-bottom:14px;display:none}
    .h-msg.ok{background:#DCFCE7;color:#166534;display:block}
    .h-msg.err{background:#FEE2E2;color:#DC2626;display:block}
    .req-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f5f5f5}
    .req-row:last-child{border-bottom:none}
    .req-amount{font-weight:700;font-size:14.5px;color:#111}
    .req-date{font-size:12px;color:#999;margin-top:2px}
    .req-status{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
    .st-pending{background:#FFFBEB;color:#D97706}
    .st-confirmed{background:#DCFCE7;color:#166534}
    .st-rejected{background:#FEE2E2;color:#DC2626}
    .empty{text-align:center;padding:24px;color:#bbb;font-size:13px}
  </style>
</head>
<body>
  <div class="h-topbar">
    <div>
      <div class="name">👷 {{ employee.name }}</div>
      <div class="role">{{ employee.position or 'Hodim' }}</div>
    </div>
    <a href="/hodim/logout" class="h-logout">Chiqish</a>
  </div>

  <div class="h-body">
    <div class="h-card">
      <div class="h-card-title">💰 Avans oldim deb yozish</div>
      <div id="h-msg" class="h-msg"></div>
      <form id="req-form">
        <label class="field-label">Summasi (so'm)</label>
        <input class="field-input" type="number" id="f-amount" placeholder="500000" min="1" required>

        <label class="field-label">Qachon oldingiz?</label>
        <input class="field-input" type="date" id="f-date" required>

        <label class="field-label">Izoh (ixtiyoriy)</label>
        <input class="field-input" type="text" id="f-notes" placeholder="Masalan: naqd, ustadan oldim">

        <button type="submit" class="h-btn" id="submit-btn">Yuborish</button>
      </form>
      <div style="font-size:12px;color:#aaa;margin-top:10px;text-align:center">
        Yuborilgandan keyin — admin tasdiqlashi kerak
      </div>
    </div>

    <div class="h-card">
      <div class="h-card-title">📋 Mening so'rovlarim</div>
      <div id="req-list"><div class="empty">Yuklanmoqda...</div></div>
    </div>
  </div>

<script>
document.getElementById('f-date').value = new Date().toISOString().slice(0,10);

document.getElementById('req-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('h-msg');
  const amount = document.getElementById('f-amount').value;
  const date = document.getElementById('f-date').value;
  const notes = document.getElementById('f-notes').value;

  if (!amount || amount <= 0) {
    msg.className = 'h-msg err'; msg.textContent = "Summani to'g'ri kiriting"; return;
  }

  btn.disabled = true; btn.textContent = 'Yuborilmoqda...';
  try {
    const fd = new FormData();
    fd.append('amount', amount);
    fd.append('requested_date', date);
    fd.append('notes', notes);
    const res = await fetch('/api/hodim/advance-request', { method: 'POST', body: fd });
    if (res.ok) {
      msg.className = 'h-msg ok';
      msg.textContent = "✅ Yuborildi! Admin tasdiqlashini kuting.";
      document.getElementById('req-form').reset();
      document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
      loadMyRequests();
    } else {
      const e2 = await res.json();
      msg.className = 'h-msg err'; msg.textContent = '❌ ' + (e2.detail || 'Xato yuz berdi');
    }
  } catch(err) {
    msg.className = 'h-msg err'; msg.textContent = '❌ Server bilan aloqa yo\'q';
  }
  btn.disabled = false; btn.textContent = 'Yuborish';
});

async function loadMyRequests(){
  const list = document.getElementById('req-list');
  try {
    const rows = await fetch('/api/hodim/my-requests').then(r => r.json());
    if (!rows.length) { list.innerHTML = '<div class="empty">Hali so\'rov yubormagansiz</div>'; return; }
    const fmt = n => Math.round(n||0).toLocaleString('ru-RU').replace(/,/g,' ');
    const statusLabel = {pending: '⏳ Kutilmoqda', confirmed: '✅ Tasdiqlandi', rejected: '❌ Rad etildi'};
    const statusClass = {pending: 'st-pending', confirmed: 'st-confirmed', rejected: 'st-rejected'};
    list.innerHTML = rows.map(r => `
      <div class="req-row">
        <div>
          <div class="req-amount">${fmt(r.amount)} so'm</div>
          <div class="req-date">${new Date(r.requested_date).toLocaleDateString('uz')}${r.notes ? ' · ' + r.notes : ''}</div>
        </div>
        <div class="req-status ${statusClass[r.status]}">${statusLabel[r.status]}</div>
      </div>`).join('');
  } catch(e) {
    list.innerHTML = '<div class="empty">Yuklashda xato</div>';
  }
}
loadMyRequests();
</script>
</body>
</html>
